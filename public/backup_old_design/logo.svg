<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#60a5fa" stroke-width="3"/>
  <!-- Shine overlay -->
  <ellipse cx="100" cy="70" rx="75" ry="55" fill="url(#shine)" opacity="0.3"/>
  <!-- Backpack body -->
  <rect x="55" y="65" width="90" height="80" rx="18" fill="#f59e0b" stroke="#d97706" stroke-width="2.5"/>
  <!-- Backpack top flap -->
  <path d="M65 75 Q100 45 135 75" fill="none" stroke="#d97706" stroke-width="3"/>
  <!-- Backpack straps -->
  <path d="M72 65 Q68 45 78 35" fill="none" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
  <path d="M128 65 Q132 45 122 35" fill="none" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
  <!-- Backpack pocket -->
  <rect x="75" y="100" width="50" height="30" rx="8" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <!-- Pocket zipper -->
  <line x1="88" y1="115" x2="112" y2="115" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
  <!-- Star decoration -->
  <polygon points="100,88 103,94 110,95 105,100 106,107 100,103 94,107 95,100 90,95 97,94" fill="#fff" opacity="0.9"/>
  <!-- W letter -->
  <text x="100" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-weight="800" font-size="28" fill="#fff" letter-spacing="2">WK</text>
</svg>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>לוח בית ספר</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Pull-to-refresh indicator -->
  <div id="ptr" class="ptr">
    <div class="ptr-spinner"></div>
    <span id="ptr-text">משוך למטה לרענון</span>
  </div>

  <!-- Loading overlay -->
  <div id="spinner" class="spinner-overlay">
    <div class="spinner"></div>
    <p>טוען נתונים...</p>
  </div>

  <!-- Sticky top bar -->
  <div class="top-bar">

    <!-- Header -->
    <header class="header">
      <div class="header-right">
        <span class="icon">🎒</span>
        <div class="student-info">
          <span id="student-name" class="student-name">טוען...</span>
          <!-- Student switcher pills populated by JS -->
          <div id="student-switcher" class="student-switcher"></div>
        </div>
      </div>
      <div class="header-left">
        <span id="last-update" class="last-update"></span>
        <button id="btn-refresh" class="btn-refresh" onclick="refresh()">🔄</button>
      </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Section tabs (navigate between main sections) -->
    <nav class="section-tabs" id="section-tabs">
      <button class="stab active" data-section="overview">🏠 סקירה</button>
      <button class="stab" data-section="homework">📚 שיעורי בית</button>
      <button class="stab" data-section="events">📋 אירועים</button>
      <button class="stab" data-section="feed">📬 הכל</button>
    </nav>

    <!-- Filter tabs (inside feed section) -->
    <nav class="filter-tabs hidden" id="filter-tabs">
      <button class="tab active" data-filter="all">הכל</button>
      <button class="tab" data-filter="homework">📚 שיעורי בית</button>
      <button class="tab" data-filter="homework_not_done">⚠️ אי הכנה</button>
      <button class="tab" data-filter="late">⏰ איחורים</button>
      <button class="tab" data-filter="absence">🚫 חיסורים</button>
      <button class="tab" data-filter="missing_equipment">🎒 ציוד חסר</button>
      <button class="tab" data-filter="grade">🏅 ציונים</button>
    </nav>

  </div>

  <!-- SECTION: Overview (homework + events side by side) -->
  <section id="section-overview" class="page-section active">
    <div class="main-grid">
      <div class="col">
        <h2 class="section-title">📚 שיעורי בית</h2>
        <div id="hw-list-overview" class="card-list"></div>
      </div>
      <div class="col">
        <h2 class="section-title">📋 אירועי שיעור</h2>
        <div id="events-list-overview" class="card-list"></div>
      </div>
    </div>
  </section>

  <!-- SECTION: Homework only (full width) -->
  <section id="section-homework" class="page-section hidden">
    <div class="single-col">
      <h2 class="section-title">📚 שיעורי בית</h2>
      <div id="hw-list-hw" class="card-list"></div>
    </div>
  </section>

  <!-- SECTION: Class events only (full width) -->
  <section id="section-events" class="page-section hidden">
    <div class="single-col">
      <h2 class="section-title">📋 אירועי שיעור</h2>
      <div id="events-list-events" class="card-list"></div>
    </div>
  </section>

  <!-- SECTION: Full feed with type filter -->
  <section id="section-feed" class="page-section hidden">
    <div class="single-col">
      <div id="feed-list" class="card-list"></div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
